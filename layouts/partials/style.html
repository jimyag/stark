<style>
  :root {
    --theme: #ffffff;
    --entry: #ffffff;
    --primary: #1f2937;
    --secondary: #6b7280;
    --tertiary: #e5e7eb;
    --content: #374151;
    --code-bg: #f6f8fa;
    --code-inline-bg: #f3f4f6;
    --border: #e5e7eb;
    --surface-muted: #f8fafc;
    --surface-subtle: #f1f5f9;
    --link: #0891b2;
    --link-hover: #0e7490;
    --link-visited: #0f766e;
    --focus: #0891b2;
  }

  html[data-theme="dark"] {
    --theme: #0f172a;
    --entry: #111827;
    --primary: #e5e7eb;
    --secondary: #9ca3af;
    --tertiary: #334155;
    --content: #d1d5db;
    --code-bg: #1e293b;
    --code-inline-bg: #1f2937;
    --border: #334155;
    --surface-muted: #0b1220;
    --surface-subtle: #172033;
    --link: #22d3ee;
    --link-hover: #67e8f9;
    --link-visited: #5eead4;
    --focus: #22d3ee;
  }

  body {
    font-family: Verdana, sans-serif;
    margin: auto;
    padding: 20px;
    max-width: 720px;
    text-align: left;
    background-color: var(--theme);
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.5;
    color: var(--content);
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6,
  strong,
  b {
    color: var(--primary);
  }

  a {
    color: var(--link);
  }

  .title {
    text-decoration: none;
    border: 0;
  }

  .title span {
    font-weight: 400;
  }

  nav a {
    margin-right: 10px;
  }

  textarea {
    width: 100%;
    font-size: 16px;
  }

  input {
    font-size: 16px;
  }

  content {
    line-height: 1.6;
  }

  table {
    width: 100%;
  }

  img {
    max-width: 100%;
  }

  code {
    padding: 2px 5px;
    background-color: var(--code-inline-bg);
  }

  pre {
    background-color: var(--code-bg);
    color: var(--primary);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow-x: auto;
  }

  pre code {
    color: var(--primary);
    display: block;
    padding: 20px;
    white-space: pre-wrap;
    font-size: 14px;
    overflow-x: auto;
  }

  div.highlight pre {
    background-color: initial;
    color: initial;
  }

  div.highlight code {
    background-color: unset;
    color: unset;
  }

  blockquote {
    border-left: 1px solid var(--border);
    color: var(--primary);
    padding-left: 20px;
    font-style: italic;
  }

  footer {
    padding: 25px;
    text-align: center;
  }

  .helptext {
    color: var(--secondary);
    font-size: small;
  }

  .errorlist {
    color: #eba613;
    font-size: small;
  }

  ul.blog-posts {
    list-style-type: none;
    padding: unset;
  }

  ul.blog-posts li {
    display: flex;
  }

  ul.blog-posts li span {
    flex: 0 0 130px;
  }

  ul.blog-posts li a:visited {
    color: var(--link-visited);
  }

  :is(textarea, input) {
    background-color: var(--entry);
    color: var(--content);
    border: 1px solid var(--border);
  }
</style>
