baseURL = "https://example.com"

theme = "stark"
title = "ᕕ( ᐛ )ᕗ My Blog"
copyright = "Copyright © 2024, Your Name."
languageCode = "zh-CN"

enableRobotsTXT = true

# Bearblog-style clean URLs; suppress unused taxonomy pages
disableKinds = ["taxonomy"]
ignoreErrors = ["error-disable-taxonomy", "warning-goldmark-raw-html"]

[permalinks]
blog = "/posts/:slug/"
tags = "/blog/:slug"

# Search requires the JSON output on the home page
[outputs]
  home = ["HTML", "RSS", "JSON"]

[[menu.main]]
  name = "RSS"
  url = "/index.xml"
  weight = 2

[params]
description = "A minimal blog about software engineering"
favicon    = "images/favicon.png"
images     = ["images/share.png"]  # default OG share image
dateFormat = "2006-01-02"
hideMadeWithLine = false
# ogLocale = "zh_CN"

[params.author]
  name  = "Your Name"
  email = "you@example.com"

# Used by structured_data.html to populate schema.org Person.sameAs
[params.social]
  github        = "your-github-username"
  # stackoverflow = "https://stackoverflow.com/users/..."
  # twitter       = "your-twitter-handle"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true          # allow raw HTML in Markdown
  [markup.highlight]
    style              = "monokai"
    lineNos            = true
    lineNumbersInTable = true
    codeFences         = true
    guessSyntax        = true
    noClasses          = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 4
